<!DOCTYPE html>
<html>
<head>
    <title>Note Form</title>
</head>
<body>
    <h2 id="form-title">Note</h2>
    <input type="text" id="title" placeholder="Title">
    <textarea id="content" placeholder="Content"></textarea>
    <button onclick="saveNote()">Save</button>
    <a href="/notes/">Cancel</a>

    <script>
        const token = localStorage.getItem('access_token')
        if (!token) window.location.href = '/login/'

        const noteId = window.location.pathname.split('/')[2]
        const isEdit = noteId && noteId !== 'create'

        if (isEdit) {
            document.getElementById('form-title').innerText = 'Edit Note'
            fetch(`http://127.0.0.1:8000/api/notes/${noteId}/`, {
                headers: {'Authorization': `Bearer ${token}`}
            })
            .then(res => res.json())
            .then(note => {
                document.getElementById('title').value = note.title
                document.getElementById('content').value = note.content
            })
        }

        function saveNote() {
            const title = document.getElementById('title').value
            const content = document.getElementById('content').value

            const url = isEdit
                ? `http://127.0.0.1:8000/api/notes/${noteId}/`
                : 'http://127.0.0.1:8000/api/notes/'

            fetch(url, {
                method: isEdit ? 'PUT' : 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({title, content})
            })
            .then(() => window.location.href = '/notes/')
        }
    </script>
</body>
</html>
