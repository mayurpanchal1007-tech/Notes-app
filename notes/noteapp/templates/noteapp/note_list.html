<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">My Notes</h1>
            <a href="{% url 'note_create' %}" class="btn btn-primary">+ Add Note</a>
        </div>

        {% if notes %}
            {% for note in notes %}
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ note.title }}</h5>
                    <p class="card-text">{{ note.content }}</p>
                    <small class="text-muted">{{ note.created_at }}</small>
                    <div class="mt-2">
                        <a href="{% url 'note_update' note.pk %}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="{% url 'note_delete' note.pk %}" class="btn btn-sm btn-danger">Delete</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="alert alert-info">No notes yet. Create one!</div>
        {% endif %}
    </div>
</body>
</html>
