<!DOCTYPE html>
<html>
<head>
    <title>Note Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm" style="max-width: 600px; margin: auto;">
            <div class="card-body">
                <h3 class="card-title mb-4">
                    {% if form.instance.pk %}Edit Note{% else %}New Note{% endif %}
                </h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Title</label>
                        <input type="text" name="title" value="{{ form.title.value|default:'' }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Content</label>
                        <textarea name="content" class="form-control" rows="5" required>{{ form.content.value|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Save</button>
                    <a href="{% url 'note_list' %}" class="btn btn-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
